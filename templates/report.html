<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Executive Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: #f4f7fa;
        }
        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .08);
        }
        .metric {
            font-size: 34px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Executive Security Report</h1>
        <div class="row mt-4">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Total Incidents</h6>
                        <div id="incidents" class="metric">0</div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Risk Assessments</h6>
                        <div id="risk" class="metric">0</div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Compliance</h6>
                        <div id="compliance" class="metric">0</div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Evidence</h6>
                        <div id="evidence" class="metric">0</div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Audit Logs</h6>
                        <div id="audit" class="metric">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Compliance Overview</h5>
                        <canvas id="complianceChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Risk Distribution</h5>
                        <canvas id="riskChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/report.js"></script>
</body>
</html>
