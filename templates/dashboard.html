<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>GRC Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/dashboard.css" />
</head>
<body>
    <div class="container">
        <h1 class="mt-4">Security Governance Dashboard</h1>
        <!-- KPIS -->
        <div class="row mt-4">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Events</h6>
                        <h2 id="events"></h2>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Incidents</h6>
                        <h2 id="incidents"></h2>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Risk Assessments</h6>
                        <h2 id="risk"></h2>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h6>Violations</h6>
                        <h2 id="violations"></h2>
                    </div>
                </div>
            </div>
        </div>
        <!-- charts -->
        <div class="row mt-5">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Risk Distribution</h5>
                        <canvas id="riskChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Compliance</h5>
                        <canvas id="complianceChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h5>Top Assets</h5>
                        <ul id="topAssets"></ul>
                    </div>
                </div>
            </div>
        </div>
        <!---->
        <div class="row mt-5">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>Incident Status</h5>
                        <canvas id="incidentChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>Critical Active</h5>
                        <h2 id="critical"></h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>MTTR</h5>
                        <h2 id="mttr"></h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-5">
            <div class="col">
                <div class="card">
                    <div class="card-body">
                        <h5>Recent Incidents</h5>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Status</th>
                                    <th>Risk</th>
                                    <th>Assigned</th>
                                </tr>
                            </thead>
                            <tbody id="recentIncidents"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
